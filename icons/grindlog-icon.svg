<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0d0d0d" rx="80"/>

  <!-- Red accent border frame -->
  <rect x="24" y="24" width="464" height="464" fill="none" stroke="#e63946" stroke-width="16" rx="64"/>

  <!-- Red top bar accent -->
  <rect x="24" y="24" width="464" height="8" fill="#e63946" rx="4"/>

  <!-- G letter -->
  <text
    x="108"
    y="340"
    font-family="Arial Black, Impact, sans-serif"
    font-weight="900"
    font-size="240"
    fill="#f0f0f0"
    letter-spacing="-8"
  >G</text>

  <!-- L letter -->
  <text
    x="278"
    y="340"
    font-family="Arial Black, Impact, sans-serif"
    font-weight="900"
    font-size="240"
    fill="#e63946"
    letter-spacing="-8"
  >L</text>

  <!-- Bottom tagline -->
  <text
    x="256"
    y="420"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="32"
    fill="#888888"
    text-anchor="middle"
    letter-spacing="6"
  >GRINDLOG</text>
</svg>
